<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="La Rusia">
<meta name="theme-color" content="#ffffff">
<title>La Rusia — Inventario</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#ffffff;--surface:#f5f5f5;--card:#ffffff;--border:#e0e0e0;--border2:#cccccc;--text:#111111;--muted:#666666;--light:#999999;--accent:#111111;--green:#2d7a3a;--red:#c0392b;--amber:#b7760d;--green-bg:#eaf3de;--green-txt:#3b6d11;--blue-bg:#e6f1fb;--blue-txt:#185fa5;--amber-bg:#faeeda;--amber-txt:#854f0b;--radius:10px;--radius-lg:14px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;}
/* HEADER */
.app-header{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;border-bottom:0.5px solid var(--border);background:#fff;position:sticky;top:0;z-index:20;}
.app-logo{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.app-title{font-size:16px;font-weight:600;color:var(--text);}
.app-sub{font-size:11px;color:var(--muted);}
/* TABS */
.tabs{display:flex;background:#fff;border-bottom:0.5px solid var(--border);position:sticky;top:64px;z-index:19;}
.tab{flex:1;padding:11px 4px;font-size:12px;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;font-weight:500;}
.tab.active{color:var(--text);border-bottom-color:var(--text);}
/* VIEWS */
.view{display:none;padding:14px 14px 90px;}.view.active{display:block;}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat{background:var(--surface);border-radius:var(--radius);padding:10px;text-align:center;}
.stat-val{font-size:22px;font-weight:600;color:var(--text);}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.3px;}
/* CARDS */
.card{background:#fff;border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:13px;margin-bottom:8px;border-left:3px solid var(--border2);}
.card.mh{border-left-color:var(--red);}.card.mm{border-left-color:var(--amber);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;}
.card-name{font-size:14px;font-weight:600;color:var(--text);flex:1;padding-right:6px;}
.card-btns{display:flex;gap:5px;}
.bsm{width:28px;height:28px;border-radius:8px;border:0.5px solid var(--border2);background:transparent;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.field{background:var(--surface);border-radius:8px;padding:7px 9px;}
.fl{font-size:9px;color:var(--light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.fv{font-size:13px;font-weight:600;color:var(--text);}
.fv.g{color:var(--green);}.fv.r{color:var(--red);}.fv.a{color:var(--amber);}
.cmeta{display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border);font-size:10px;color:var(--light);}
/* FORM */
.lbl{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;font-weight:500;}
.lbl.req::after{content:' *';color:var(--red);}
.fg{margin-bottom:12px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
input[type=text],input[type=number],input[type=date],select{width:100%;background:#fff;border:1px solid var(--border2);border-radius:var(--radius);padding:11px 13px;color:var(--text);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;}
input:focus,select:focus{border-color:var(--text);}
.input-err{border-color:var(--red) !important;}
.err-msg{font-size:10px;color:var(--red);margin-top:3px;display:none;}
.err-msg.show{display:block;}
.bp{width:100%;padding:13px;background:var(--text);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;}
.bp:active{opacity:.85;}
.bo{width:100%;padding:11px;background:transparent;color:var(--text);border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;cursor:pointer;margin-top:8px;font-weight:500;}
.bpdf{width:100%;padding:11px;background:transparent;color:var(--red);border:1px solid var(--red);border-radius:var(--radius);font-size:13px;cursor:pointer;margin-top:7px;font-weight:600;}
.bxls{width:100%;padding:11px;background:transparent;color:#185fa5;border:1px solid #185fa5;border-radius:var(--radius);font-size:13px;cursor:pointer;margin-top:7px;font-weight:600;}
.hint{font-size:11px;color:var(--muted);padding:9px 11px;background:var(--surface);border-radius:var(--radius);}
.slbl{font-size:10px;color:var(--light);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.empty{text-align:center;padding:40px 16px;color:var(--light);font-size:13px;line-height:1.6;}
/* BADGES */
.abadge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;margin-bottom:3px;}
.bc{background:var(--green-bg);color:var(--green-txt);}
.bs{background:var(--blue-bg);color:var(--blue-txt);}
.bb{background:var(--amber-bg);color:var(--amber-txt);}
/* HISTORIAL */
.day-card{background:#fff;border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;}
.day-hdr{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;background:var(--surface);cursor:pointer;user-select:none;}
.day-date{font-size:13px;font-weight:600;color:var(--text);}
.day-info{font-size:11px;color:var(--muted);}
.day-body{padding:10px 13px;display:none;}
.day-body.open{display:block;}
.area-st{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--light);margin:8px 0 4px;padding-bottom:4px;border-bottom:0.5px solid var(--border);}
.hrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:12px;}
.hrow:last-child{border:none;}
.hprod{color:var(--text);flex:2;font-weight:600;}
.hnums{display:flex;gap:10px;font-size:11px;color:var(--muted);}
.day-actions{display:flex;gap:7px;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);}
.day-actions button{flex:1;margin:0;}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;align-items:flex-end;}
.filter-bar .fg{flex:1;margin:0;}
.pnote{font-size:10px;color:var(--light);margin-top:5px;text-align:center;}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:18px 18px 0 0;padding:20px 16px 40px;width:100%;max-width:430px;border-top:0.5px solid var(--border);}
.mhdl{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:9px 18px;border-radius:22px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:99;}
</style>
</head>

<div id="view-hoy" class="view active">
  <div class="stats" id="stats"></div>
  <div class="slbl">Registros de hoy</div>

</div>

<div id="view-agregar" class="view">
  <div class="fg">
    <label class="lbl">Area — elige primero</label>
    <select id="f-area" onchange="onAreaChange()">
      <option value="">— Seleccionar area —</option>
      <option>Cocina</option><option>Barra de Sushi</option><option>Barra de alcoholes</option>
    </select>
  </div>
  <div id="prod-section" style="display:none;">
    <div class="fg"><label class="lbl">Producto</label><select id="f-sel" onchange="onSel()"></select></div>
    <div id="new-grp" style="display:none;" class="fg">
      <label class="lbl">Nombre nuevo producto</label>
      <input type="text" id="f-nuevo" placeholder="Ej: Ceviche mixto...">
    </div>
    <div class="fr">
      <div class="fg" style="margin:0"><label class="lbl">Stock</label><input type="number" id="f-stock" placeholder="0" min="0" step="0.01"></div>
      <div class="fg" style="margin:0"><label class="lbl">Unidad stock</label>
        <select id="f-ustock"><option>kg</option><option>g</option><option>L</option><option>ml</option><option selected>unid</option><option>caja</option></select>
      </div>
    </div>
    <div class="fr">
      <div class="fg" style="margin:0"><label class="lbl">Merma</label><input type="number" id="f-merma" placeholder="0" min="0" step="0.01"></div>
      <div class="fg" style="margin:0"><label class="lbl">Unidad merma</label>
        <select id="f-umerma"><option>kg</option><option>g</option><option>L</option><option>ml</option><option selected>unid</option><option>%</option></select>
      </div>
    </div>
    <div class="fg">
      <label class="lbl req">Nombre Colaborador La Rusia</label>
      <input type="text" id="f-resp" placeholder="Nombre Colaborador La Rusia" oninput="clearRespErr()">
      <div class="err-msg" id="resp-err">Este campo es obligatorio</div>
    </div>
    <button class="bp" onclick="addProduct()">Registrar producto</button>
  </div>
  <div id="area-hint" class="hint">Selecciona un area para ver los productos disponibles.</div>
</div>

<div id="view-historial" class="view">
  <div class="filter-bar">
    <div class="fg"><label class="lbl">Filtrar por fecha</label><input type="date" id="hist-filter" onchange="renderHistorial()"></div>
    <button class="bo" style="margin:0;width:auto;padding:11px 14px;font-size:11px;" onclick="document.getElementById('hist-filter').value='';renderHistorial()">Ver todo</button>
  </div>

  <div style="margin-top:14px;">
    <button class="bxls" onclick="exportarExcel()">Descargar historial completo — Excel</button>

  </div>
</div>

// ── PERSISTENCIA localStorage ──────────────────────────────────────
function saveData(){
  try{
    localStorage.setItem('larusia_hist', JSON.stringify(HIST));
    localStorage.setItem('larusia_extra', JSON.stringify(EXTRA));
  }catch(e){}
}
function loadData(){
  try{
    const h=localStorage.getItem('larusia_hist');
    const e=localStorage.getItem('larusia_extra');
    if(h) Object.assign(HIST, JSON.parse(h));
    if(e) Object.assign(EXTRA, JSON.parse(e));
  }catch(e){}
}

let HIST={};
let EXTRA={"Cocina":[],"Barra de Sushi":[],"Barra de alcoholes":[]};
loadData();

function today(){ return new Date().toLocaleDateString('es-CL'); }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).substr(2,4); }
function clDate(iso){ if(!iso)return''; const[y,m,d]=iso.split('-'); return d+'/'+m+'/'+y; }

function showTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['hoy','agregar','historial'][i]===t));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id==='view-'+t));
  if(t==='historial') renderHistorial();
  if(t==='hoy') renderStock();
}

function onAreaChange(){
  const area=document.getElementById('f-area').value;
  if(!area){
    document.getElementById('prod-section').style.display='none';
    document.getElementById('area-hint').style.display='block';
    return;
  }
  document.getElementById('area-hint').style.display='none';
  document.getElementById('prod-section').style.display='block';
  renderPS(area);
  document.getElementById('f-sel').value='';
  document.getElementById('new-grp').style.display='none';
}
function renderPS(area){
  const all=[...new Set([...(CATALOG[area]||[]),...(EXTRA[area]||[])])].sort((a,b)=>a.localeCompare(b,'es'));
  document.getElementById('f-sel').innerHTML=
    '<option value="">— Seleccionar producto —</option>'+
    all.map(p=>'<option value="'+p+'">'+p+'</option>').join('')+
    '<option value="__nuevo__">+ Crear nuevo producto...</option>';
}
function onSel(){
  const v=document.getElementById('f-sel').value;
  document.getElementById('new-grp').style.display=v==='__nuevo__'?'block':'none';
  if(v==='__nuevo__') document.getElementById('f-nuevo').focus();
}
function clearRespErr(){
  document.getElementById('f-resp').classList.remove('input-err');
  document.getElementById('resp-err').classList.remove('show');
}
function addProduct(){
  const area=document.getElementById('f-area').value;
  const sel=document.getElementById('f-sel').value;
  let prod=sel==='__nuevo__'?document.getElementById('f-nuevo').value.trim():sel;
  const stock=parseFloat(document.getElementById('f-stock').value)||0;
  const ustock=document.getElementById('f-ustock').value;
  const merma=parseFloat(document.getElementById('f-merma').value)||0;
  const umerma=document.getElementById('f-umerma').value;
  const resp=document.getElementById('f-resp').value.trim();
  if(!area) return toast('Selecciona un area');
  if(!prod) return toast('Selecciona o ingresa un producto');
  if(!resp){
    document.getElementById('f-resp').classList.add('input-err');
    document.getElementById('resp-err').classList.add('show');
    document.getElementById('f-resp').focus();
    return;
  }
  if(sel==='__nuevo__'&&prod){
    if(!EXTRA[area]) EXTRA[area]=[];
    if(![...(CATALOG[area]||[]),...EXTRA[area]].some(p=>p.toLowerCase()===prod.toLowerCase()))
      EXTRA[area].push(prod);
    renderPS(area);
  }
  const fecha=today();
  if(!HIST[fecha]) HIST[fecha]=[];
  HIST[fecha].push({
    id:genId(),producto:prod,stock,ustock,merma,umerma,
    area,responsable:resp,fecha,
    hora:new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})
  });
  saveData();
  clearForm(); renderStock(); toast('Producto registrado'); showTab('hoy');
}
function clearForm(){
  document.getElementById('f-area').value='';
  document.getElementById('f-sel').value='';
  document.getElementById('f-nuevo').value='';
  document.getElementById('new-grp').style.display='none';
  document.getElementById('prod-section').style.display='none';
  document.getElementById('area-hint').style.display='block';
  ['f-stock','f-merma','f-resp'].forEach(id=>document.getElementById(id).value='');
  clearRespErr();
}
function renderStock(){
  const recs=HIST[today()]||[];
  const ts=recs.reduce((a,p)=>a+(p.stock||0),0).toFixed(1);
  const tm=recs.reduce((a,p)=>a+(p.merma||0),0).toFixed(1);
  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="stat-val">'+recs.length+'</div><div class="stat-lbl">Hoy</div></div>'+
    '<div class="stat"><div class="stat-val">'+ts+'</div><div class="stat-lbl">Stock total</div></div>'+
    '<div class="stat"><div class="stat-val">'+tm+'</div><div class="stat-lbl">Merma total</div></div>';
  const list=document.getElementById('product-list');
  if(!recs.length){list.innerHTML='<div class="empty">Sin registros hoy.<br>Usa Agregar para comenzar.</div>';return;}
  list.innerHTML=[...recs].reverse().map(p=>{
    const pct=p.stock>0?(p.merma/p.stock*100).toFixed(1):0;
    const cls=pct>20?'mh':pct>10?'mm':'';
    const vc=pct>20?'r':pct>10?'a':'g';
    const bc=p.area==='Cocina'?'bc':p.area==='Barra de Sushi'?'bs':'bb';
    return '<div class="card '+cls+'">'+
      '<div class="card-top">'+
        '<div><span class="abadge '+bc+'">'+p.area+'</span><div class="card-name">'+p.producto+'</div></div>'+
        '<div class="card-btns">'+
          '<button class="bsm" onclick="openEdit(''+p.id+'',''+p.fecha+'')">&#9999;</button>'+
          '<button class="bsm" onclick="delReg(''+p.id+'',''+p.fecha+'')">&#x2715;</button>'+
        '</div>'+
      '</div>'+
      '<div class="cgrid">'+
        '<div class="field"><div class="fl">Stock</div><div class="fv g">'+p.stock+' '+p.ustock+'</div></div>'+
        '<div class="field"><div class="fl">Merma</div><div class="fv '+vc+'">'+p.merma+' '+p.umerma+'</div></div>'+
        '<div class="field"><div class="fl">% merma</div><div class="fv '+vc+'">'+pct+'%</div></div>'+
        '<div class="field"><div class="fl">Area</div><div class="fv" style="font-size:11px;color:var(--text)">'+p.area+'</div></div>'+
      '</div>'+
      '<div class="cmeta"><span>&#128100; '+p.responsable+'</span><span>'+p.hora+'</span></div>'+
    '</div>';
  }).join('');
}
function delReg(id,fecha){
  if(!confirm('Eliminar este registro?')) return;
  if(HIST[fecha]) HIST[fecha]=HIST[fecha].filter(p=>p.id!==id);
  saveData(); renderStock(); toast('Registro eliminado');
}
function openEdit(id,fecha){
  const p=(HIST[fecha]||[]).find(x=>x.id===id); if(!p) return;
  document.getElementById('e-id').value=id;
  document.getElementById('e-fecha').value=fecha;
  document.getElementById('e-prod').value=p.producto;
  document.getElementById('e-stock').value=p.stock;
  document.getElementById('e-ustock').value=p.ustock;
  document.getElementById('e-merma').value=p.merma;
  document.getElementById('e-umerma').value=p.umerma;
  document.getElementById('e-area').value=p.area;
  document.getElementById('e-resp').value=p.responsable;
  document.getElementById('edit-modal').classList.add('open');
}
function closeModal(e){if(e.target.id==='edit-modal') document.getElementById('edit-modal').classList.remove('open');}
function saveEdit(){
  const id=document.getElementById('e-id').value;
  const fecha=document.getElementById('e-fecha').value;
  const resp=document.getElementById('e-resp').value.trim();
  if(!resp){document.getElementById('e-resp').classList.add('input-err');document.getElementById('e-resp').focus();return;}
  const arr=HIST[fecha]||[]; const idx=arr.findIndex(p=>p.id===id); if(idx===-1) return;
  arr[idx].producto=document.getElementById('e-prod').value.trim()||arr[idx].producto;
  arr[idx].stock=parseFloat(document.getElementById('e-stock').value)||0;
  arr[idx].ustock=document.getElementById('e-ustock').value;
  arr[idx].merma=parseFloat(document.getElementById('e-merma').value)||0;
  arr[idx].umerma=document.getElementById('e-umerma').value;
  arr[idx].area=document.getElementById('e-area').value||arr[idx].area;
  arr[idx].responsable=resp;
  document.getElementById('e-resp').classList.remove('input-err');
  document.getElementById('edit-modal').classList.remove('open');
  saveData(); renderStock(); renderHistorial(); toast('Cambios guardados');
}
function renderHistorial(){
  const filterISO=document.getElementById('hist-filter').value;
  const filterCL=filterISO?clDate(filterISO):'';
  const list=document.getElementById('hist-list');
  const fechas=Object.keys(HIST).sort((a,b)=>{
    const pa=a.split('/').reverse().join(''),pb=b.split('/').reverse().join('');
    return pb.localeCompare(pa);
  });
  const filtered=filterCL?fechas.filter(f=>f===filterCL):fechas;
  if(!filtered.length){list.innerHTML='<div class="empty">Sin registros'+(filterCL?' para '+filterCL:'')+'.</div>';return;}
  list.innerHTML=filtered.map(fecha=>{
    const recs=HIST[fecha]||[];
    const areas=[...new Set(recs.map(r=>r.area))];
    const bid='body-'+fecha.replace(/\//g,'-');
    const secs=areas.map(area=>{
      const items=recs.filter(r=>r.area===area);
      const bc=area==='Cocina'?'bc':area==='Barra de Sushi'?'bs':'bb';
      return '<div class="area-st"><span class="abadge '+bc+'">'+area+'</span></div>'+
        items.map(p=>'<div class="hrow"><span class="hprod">'+p.producto+'</span><span class="hnums"><span>Stock: '+p.stock+' '+p.ustock+'</span><span>Merma: '+p.merma+' '+p.umerma+'</span></span></div>').join('');
    }).join('');
    const resps=[...new Set(recs.map(r=>r.responsable))].join(', ');
    return '<div class="day-card">'+
      '<div class="day-hdr" onclick="toggleDay(''+bid+'')">'+
        '<span class="day-date">'+fecha+'</span>'+
        '<span class="day-info">'+recs.length+' producto'+(recs.length!==1?'s':'')+' &middot; '+areas.length+' area'+(areas.length!==1?'s':'')+'</span>'+
      '</div>'+
      '<div class="day-body" id="'+bid+'">'+
        secs+
        '<div class="day-actions">'+
          '<button class="bpdf" onclick="generarPDF(''+fecha+'')">Generar PDF</button>'+
          '<button class="bxls" onclick="exportarExcelFecha(''+fecha+'')">Excel</button>'+
        '</div>'+
        '<div style="font-size:10px;color:var(--light);margin-top:6px;">Colaboradores: '+resps+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
}
function toggleDay(id){ document.getElementById(id).classList.toggle('open'); }

function generarPDF(fecha){
  const recs=HIST[fecha]||[];
  if(!recs.length) return toast('Sin datos para esta fecha');
  if(typeof window.jspdf==='undefined') return toast('Cargando libreria...');
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'pt',format:'letter'});
  const W=doc.internal.pageSize.getWidth(),H=doc.internal.pageSize.getHeight();
  const ml=36,mr=36,cw=W-ml-mr;
  let first=true;
  ['Cocina','Barra de Sushi','Barra de alcoholes'].forEach(area=>{
    const items=recs.filter(p=>p.area===area);
    if(!items.length) return;
    if(!first) doc.addPage();
    first=false;
    // Logo
    try{ doc.addImage('data:image/jpeg;base64,'+LOGO_DATA,'JPEG',ml,14,52,52); }catch(e){}
    // Cabecera
    doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(0,0,0);
    doc.text('REPORTE DE PRODUCTOS EN PROCESO',W/2+10,34,{align:'center'});
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(60,60,60);
    doc.text('La Rusia — Barra Nikkei',W/2+10,48,{align:'center'});
    doc.setFontSize(8);doc.setTextColor(100,100,100);
    doc.text('Fecha: '+fecha,W/2+10,60,{align:'center'});
    doc.setDrawColor(0,0,0);doc.setLineWidth(0.8);doc.line(ml,72,W-mr,72);
    // Tabla
    const rowH=22,hY=82;
    const cols=[200,70,70,110,90];
    const colX=[ml];
    for(let i=1;i<cols.length;i++) colX.push(colX[i-1]+cols[i-1]);
    doc.setFillColor(210,210,210);doc.rect(ml,hY,cw,rowH,'F');
    doc.setDrawColor(0,0,0);doc.setLineWidth(0.5);doc.rect(ml,hY,cw,rowH,'S');
    colX.forEach((x,i)=>{if(i>0)doc.line(x,hY,x,hY+rowH);});
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(0,0,0);
    ['PRODUCTO','STOCK','UNIDAD','MERMA','UNIDAD'].forEach((h,i)=>{
      doc.text(h,colX[i]+cols[i]/2,hY+rowH/2+3,{align:'center'});
    });
    doc.setFont('helvetica','normal');doc.setFontSize(9);
    for(let r=0;r<20;r++){
      const y=hY+(r+1)*rowH; const p=items[r]||null;
      if(r%2===1){doc.setFillColor(248,248,248);doc.rect(ml,y,cw,rowH,'F');}
      doc.setDrawColor(170,170,170);doc.setLineWidth(0.3);doc.rect(ml,y,cw,rowH,'S');
      colX.forEach((x,i)=>{if(i>0)doc.line(x,y,x,y+rowH);});
      if(p){
        doc.setTextColor(0,0,0);
        doc.text(String(p.producto),colX[0]+6,y+rowH/2+3);
        doc.text(String(p.stock),colX[1]+cols[1]/2,y+rowH/2+3,{align:'center'});
        doc.text(String(p.ustock),colX[2]+cols[2]/2,y+rowH/2+3,{align:'center'});
        doc.text(String(p.merma),colX[3]+cols[3]/2,y+rowH/2+3,{align:'center'});
        doc.text(String(p.umerma),colX[4]+cols[4]/2,y+rowH/2+3,{align:'center'});
      }
    }
    // Pie
    const fy=hY+21*rowH+8,fh=24,fc=[120,cw-120];
    const resps=[...new Set(items.map(p=>p.responsable))].join(', ');
    [['FECHA',fecha],['NOMBRE COLABORADOR',resps],['AREA:',area]].forEach(([l,v],i)=>{
      const y2=fy+i*fh;
      doc.setDrawColor(0,0,0);doc.setLineWidth(0.5);doc.rect(ml,y2,cw,fh,'S');
      doc.line(ml+fc[0],y2,ml+fc[0],y2+fh);
      doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(0,0,0);doc.text(l,ml+6,y2+fh/2+3);
      doc.setFont('helvetica','normal');doc.setFontSize(9);doc.text(v,ml+fc[0]+8,y2+fh/2+3);
    });
    doc.setDrawColor(180,180,180);doc.setLineWidth(0.4);doc.line(ml,H-26,W-mr,H-26);
    doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(120,120,120);
    doc.text('Optimizacion de procesos y control de gestion — Oscar M',W/2,H-14,{align:'center'});
    doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(150,150,150);
    doc.text('La Rusia Barra Nikkei | '+fecha,W/2,H-5,{align:'center'});
  });
  doc.save('reporte_'+fecha.replace(/\//g,'-')+'.pdf');
  toast('PDF generado');
}

function exportarExcel(){
  if(typeof XLSX==='undefined') return toast('Cargando libreria...');
  const allRecs=[];
  Object.keys(HIST).sort((a,b)=>a.split('/').reverse().join('').localeCompare(b.split('/').reverse().join(''))).forEach(fecha=>{
    (HIST[fecha]||[]).forEach(p=>{
      allRecs.push({'Fecha':p.fecha,'Hora':p.hora||'','Area':p.area,'Producto':p.producto,
        'Stock':p.stock,'Unidad Stock':p.ustock,'Merma':p.merma,'Unidad Merma':p.umerma,
        '% Merma':p.stock>0?parseFloat((p.merma/p.stock*100).toFixed(1)):0,'Colaborador':p.responsable});
    });
  });
  if(!allRecs.length) return toast('Sin datos para exportar');
  const wb=XLSX.utils.book_new();
  const ws1=XLSX.utils.json_to_sheet(allRecs);
  ws1['!cols']=[{wch:12},{wch:8},{wch:20},{wch:24},{wch:8},{wch:12},{wch:8},{wch:12},{wch:9},{wch:24}];
  XLSX.utils.book_append_sheet(wb,ws1,'Historial completo');
  const resumen=[];
  Object.keys(HIST).sort((a,b)=>a.split('/').reverse().join('').localeCompare(b.split('/').reverse().join(''))).forEach(fecha=>{
    (HIST[fecha]||[]).length && [...new Set((HIST[fecha]).map(r=>r.area))].forEach(area=>{
      const it=(HIST[fecha]).filter(r=>r.area===area);
      resumen.push({'Fecha':fecha,'Area':area,'N Productos':it.length,
        'Stock Total':parseFloat(it.reduce((a,p)=>a+(p.stock||0),0).toFixed(2)),
        'Merma Total':parseFloat(it.reduce((a,p)=>a+(p.merma||0),0).toFixed(2)),
        'Colaboradores':[...new Set(it.map(p=>p.responsable))].join(', ')});
    });
  });
  const ws2=XLSX.utils.json_to_sheet(resumen);
  ws2['!cols']=[{wch:12},{wch:20},{wch:12},{wch:12},{wch:12},{wch:32}];
  XLSX.utils.book_append_sheet(wb,ws2,'Resumen por fecha');
  XLSX.writeFile(wb,'inventario_larusia_'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('Excel descargado');
}

function exportarExcelFecha(fecha){
  if(typeof XLSX==='undefined') return toast('Cargando libreria...');
  const recs=HIST[fecha]||[];
  if(!recs.length) return toast('Sin datos para '+fecha);
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.json_to_sheet(recs.map(p=>({'Fecha':p.fecha,'Hora':p.hora||'','Area':p.area,'Producto':p.producto,
    'Stock':p.stock,'Unidad Stock':p.ustock,'Merma':p.merma,'Unidad Merma':p.umerma,
    '% Merma':p.stock>0?parseFloat((p.merma/p.stock*100).toFixed(1)):0,'Colaborador':p.responsable})));
  ws['!cols']=[{wch:12},{wch:8},{wch:20},{wch:24},{wch:8},{wch:12},{wch:8},{wch:12},{wch:9},{wch:24}];
  XLSX.utils.book_append_sheet(wb,ws,'Registro '+fecha.replace(/\//g,'-'));
  XLSX.writeFile(wb,'registro_'+fecha.replace(/\//g,'-')+'.xlsx');
  toast('Excel de '+fecha+' descargado');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,2400);
}

renderStock();
